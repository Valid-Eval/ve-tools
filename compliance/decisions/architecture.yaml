# Architecture & Tooling Decisions
#
# Records decisions about how the compliance operating system itself is built
# and operated. These are not vulnerability dispositions — they're design choices
# that shape the system.
#
# Each decision should have rationale, alternatives considered, and a review
# trigger (what would cause us to revisit this choice).

- id: ARCH-001
  date: 2026-03-16
  decision: "Documentation platform: GitHub + Markdown"
  description: >
    All compliance operating system documentation (design docs, commitments map,
    SSP review findings, operational narratives) lives in GitHub repos as markdown
    files. PRs are used for review and feedback from stakeholders including Rule4.
  rationale: >
    Reduces tooling surface — already using GitHub for code and operational data.
    Provides version control, PR-based review with line-level comments, direct
    AI read/write access, and shareable links for anyone with repo access. Avoids
    adding another platform (Confluence, Google Docs) to manage.
  alternatives_considered:
    - "Confluence: Better rich formatting and inline commenting, but VE usage has
      been spotty and adds a tool to maintain. Available as backup plan."
    - "Google Docs: Best for collaborative editing with non-technical stakeholders,
      but no AI integration and weak version control."
    - "Dropbox: Where SSP currently lives (uploaded from Rule4), but no collaboration
      features or version control."
  backup_plan: >
    Migrate to Confluence if GitHub markdown + PR reviews prove insufficient for
    stakeholder collaboration — specifically if Rule4 or other reviewers find the
    PR review workflow too cumbersome for narrative document feedback.
  decided_by: jacob
  review_trigger: >
    Revisit if stakeholders consistently struggle with GitHub-based review, or if
    FedRAMP 20x introduces documentation format requirements that favor a different
    platform.

- id: ARCH-002
  date: 2026-03-19
  decision: "Separate skills with shared decision record (Option B)"
  description: >
    The existing supply-chain-assessment skill and the new /compliance skill remain
    separate, independent skills invoked for different purposes. They share a common
    decision record (ve-tools/compliance/decisions/) so that vulnerability dispositions,
    risk acceptances, and other human decisions flow into a single source of truth
    regardless of which skill produced them.

    supply-chain-assessment: Deep, branch-level dependency analysis for ve-app.
    5-phase workflow with NIST-aligned scoring, agent playbooks, interactive disposition
    review. Invoked when reviewing a specific branch or preparing audit evidence.

    /compliance: Broad operational compliance management across all domains.
    Queries live data sources on demand, produces time-horizon-organized status views,
    generates compliance artifacts. Invoked for weekly triage, monthly ConMon prep, etc.

    Future skills (e.g., image-* repo management, infrastructure scanning) would follow
    the same pattern: independent invocation, shared decision record. The decision record
    in ve-tools/compliance/decisions/ is the integration point, not skill composition.
  rationale: >
    (1) Different invocation patterns — branch review vs operational dashboard.
    (2) Different depths — deep NIST scoring vs broad multi-source synthesis.
    (3) Shared decisions solve the real problem (single source of truth).
    (4) Minimal change — existing skill works, new skill built fresh.
    (5) Matches design philosophy: simple, focused tools.
  alternatives_considered:
    - "Option A (fully independent): Clean separation but dispositions tracked in two
      places. Rejected because the duplication creates audit risk."
    - "Option C (absorb into /compliance): One monolithic skill. Rejected because the
      supply-chain skill is complex (5 reference files, agent playbooks) and the use
      cases are genuinely different. Forcing them together dilutes both."
  decided_by: jacob
  next_steps:
    - "Update supply-chain-assessment to write dispositions to ve-tools/compliance/decisions/dispositions.yaml"
    - "Ensure supply-chain-assessment is aware of the compliance OS design context"
    - "Build /compliance skill v1 reading from the shared decision record"
    - "Future: evaluate whether image-* repo management warrants its own skill or extends supply-chain-assessment"
  review_trigger: >
    Revisit if the number of skills grows beyond 3, or if skill boundaries prove
    awkward in practice. The shared decision record is the stable integration point.
